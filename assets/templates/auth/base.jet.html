{{ extends "/base" }}

{{- block main() -}}{{- end -}}
{{- block __bodyExtended() -}}{{- end -}}

{{- block body() -}}
<h1 class="max-w-sm mt-12 mx-auto px-8">
  <div>
    <img src="{{ assetURL(`img/logo-text.svg`) }}" alt="Readeck Logo"
     class="w-full">
  </div>
</h1>
<main class="w-full max-w-sm p-8 mt-6 mx-auto bg-gray-100 text-gray-dark rounded-md shadow-md" id="content">
  {{ yield main() }}
</main>
{{ yield __bodyExtended() }}
{{- end -}}
