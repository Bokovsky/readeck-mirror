name: Extraction error 😵
about: When a saved page is not well rendered in Readeck
labels:
  - Extraction/Error
title: "Link not working: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a broken extraction!

        TIP: Sometimes, [Readeck's browser extension](https://readeck.org/en/extension)
        can mitigate extraction issues.

  - type: input
    id: url
    attributes:
      label: Page URL
      description: The broken page URL
      placeholder: https://
    validations:
      required: true
      regex: "^http(s)?:\\/\\/.+"

  - type: dropdown
    id: extension
    attributes:
      label: Extraction method
      description: |
        When does the issue occur? (multiple choices possible)
      options:
        - When submitting the link directly into Readeck
        - When using the browser extension
      multiple: true
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: |
        Describe what is wrong or missing in the extracted page.

        You can upload screenshots when necessary.
      placeholder: Tell us what you see!
      value: ""
    validations:
      required: true

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://codeberg.org/readeck/readeck/src/branch/main/CODE_OF_CONDUCT.md).
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
    visible: [form]
